apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
  namespace: wp
  labels:
    app: wordpress
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - wordpress
              topologyKey: "kubernetes.io/hostname"
      containers:
      - name: wordpress
        # image: wordpress:6.4.3-apache
        image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/wordpress:6.8.3
        ports:
        - name: wp
          protocol: TCP
          containerPort: 80
        env:
          - name: WORDPRESS_DB_HOST
            value: mysql.wp.svc.cluster.local:3306
          - name: WORDPRESS_DB_USER
            value: wp
          - name: WORDPRESS_DB_PASSWORD
            value: wpPassw0rd
          - name: WORDPRESS_DB_NAME
            value: wordpress
        readinessProbe:
          tcpSocket:
            port: 80
          initialDelaySeconds: 80
          periodSeconds: 5
        resources:
          limits:
            cpu: 10m
            memory: 256Mi
          requests:
            cpu: 10m
            memory: 256Mi
