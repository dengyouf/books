# Zabbix Agent 2 配置文件
# 用于监控 Kubernetes 1.31.6 集群

# 基本配置
PidFile=/var/run/zabbix/zabbix_agent2.pid
LogFile=/var/log/zabbix/zabbix_agent2.log
LogFileSize=0
DebugLevel=3

# 服务器配置
Server=127.0.0.1
ServerActive=127.0.0.1
Hostname=zabbix-k8s-monitor

# 监听配置
ListenPort=10050
ListenIP=0.0.0.0

# 包含其他配置文件
Include=/etc/zabbix/zabbix_agent2.d/*.conf

# Kubernetes API Server 配置
# 请根据实际环境修改以下参数

# Kubernetes API Server 地址
# 格式: https://<API_SERVER>:<PORT>
# 示例: https://k8s-api.example.com:6443
# 或使用内部地址: https://kubernetes.default.svc:443
Kubernetes.API.Server=https://kubernetes.default.svc:443

# ServiceAccount Token 文件路径
# 从 Kubernetes Secret 中获取的 Token 文件
Kubernetes.API.TokenFile=/etc/zabbix/k8s-token

# Kubernetes CA 证书文件路径（如果使用自签名证书）
# 如果使用集群内 ServiceAccount，通常不需要此配置
# Kubernetes.API.CAFile=/etc/zabbix/k8s-ca.crt

# API 请求超时时间（秒）
Kubernetes.API.Timeout=10

# 是否跳过 TLS 验证（不推荐在生产环境使用）
# Kubernetes.API.InsecureSkipVerify=false

# 监控配置
# 节点发现间隔（秒）
Kubernetes.Discovery.Interval=60

# Pod 发现间隔（秒）
Kubernetes.Pod.Discovery.Interval=30

# 资源指标采集间隔（秒）
Kubernetes.Metrics.Interval=60

# 用户参数配置
# 允许执行用户自定义脚本
UserParameter=kubernetes.discovery[*],/etc/zabbix/scripts/k8s-discovery.sh $1
UserParameter=kubernetes.nodes[*],/etc/zabbix/scripts/k8s-nodes.sh $1
UserParameter=kubernetes.pods[*],/etc/zabbix/scripts/k8s-pods.sh $1

# 主动检查配置（可选）
# 如果使用主动模式，取消以下注释
# StartAgents=0
# RefreshActiveChecks=60
# BufferSend=5
# BufferSize=100

# TLS 配置（如果 Zabbix Server 使用 TLS）
# TLSConnect=psk
# TLSAccept=psk
# TLSPSKIdentity=PSK 001
# TLSPSKFile=/etc/zabbix/zabbix_agent2.psk

