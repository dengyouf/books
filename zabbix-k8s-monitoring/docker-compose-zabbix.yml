version: '3.8'

services:
  # MySQL/MariaDB 数据库
  zabbix-db:
    image: arm64v8/mariadb:10.11
    container_name: zabbix-db
    environment:
      - MYSQL_DATABASE=zabbix
      - MYSQL_USER=zabbix
      - MYSQL_PASSWORD=${DB_PASSWORD:-zabbix_password_change_me}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root_password_change_me}
    volumes:
      - zabbix-db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: unless-stopped
    command:
      - --character-set-server=utf8
      - --collation-server=utf8_bin
      - --default-authentication-plugin=mysql_native_password
    networks:
      - zabbix-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_password_change_me}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zabbix Server
  zabbix-server:
    image: zabbix/zabbix-server-mysql:6.0-ubuntu-latest
    container_name: zabbix-server
    depends_on:
      zabbix-db:
        condition: service_healthy
    environment:
      - DB_SERVER_HOST=zabbix-db
      - DB_SERVER_PORT=3306
      - MYSQL_DATABASE=zabbix
      - MYSQL_USER=zabbix
      - MYSQL_PASSWORD=${DB_PASSWORD:-zabbix_password_change_me}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root_password_change_me}
    volumes:
      - zabbix-server-data:/usr/lib/zabbix/alertscripts
      - zabbix-server-data:/usr/lib/zabbix/externalscripts
      - zabbix-server-data:/usr/lib/zabbix/modules
      - zabbix-server-data:/usr/lib/zabbix/enc
      - zabbix-server-data:/usr/lib/zabbix/ssh_keys
      - zabbix-server-data:/usr/lib/zabbix/mibs
      - zabbix-server-data:/usr/lib/zabbix/ssl/certs
      - zabbix-server-data:/usr/lib/zabbix/ssl/keys
      - zabbix-server-data:/usr/lib/zabbix/ssl/ssl_ca
      - zabbix-server-data:/usr/lib/zabbix/ssl/ssl_crl
      - /etc/zabbix/k8s-token:/etc/zabbix/k8s-token:ro
      - /etc/zabbix/k8s-ca.crt:/etc/zabbix/k8s-ca.crt:ro
    ports:
      - "10051:10051"
    restart: unless-stopped
    networks:
      - zabbix-net
    ulimits:
      nproc: 65535
      nofile:
        soft: 20000
        hard: 40000

  # Zabbix Web 界面 (Nginx + PHP)
  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:6.0-ubuntu-latest
    container_name: zabbix-web
    depends_on:
      - zabbix-server
      - zabbix-db
    environment:
      - ZBX_SERVER_HOST=zabbix-server
      - ZBX_SERVER_PORT=10051
      - DB_SERVER_HOST=zabbix-db
      - DB_SERVER_PORT=3306
      - MYSQL_DATABASE=zabbix
      - MYSQL_USER=zabbix
      - MYSQL_PASSWORD=${DB_PASSWORD:-zabbix_password_change_me}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root_password_change_me}
      - PHP_TZ=${PHP_TZ:-Asia/Shanghai}
    ports:
      - "80:8080"
      - "443:8443"
    restart: unless-stopped
    networks:
      - zabbix-net


volumes:
  zabbix-db-data:
    driver: local
  zabbix-server-data:
    driver: local

networks:
  zabbix-net:
    driver: bridge

